<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — Igreja Membresia</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>

<body class="login-wrapper">
    <div class="col-md-4 col-lg-3">
        <div class="card login-card">
            <div class="card-body p-4">
                <div class="text-center mb-4">
                    <i class="bi bi-book text-primary" style="font-size:2.5rem;"></i>
                    <h4 class="fw-bold mt-2 mb-1">Igreja Membresia</h4>
                    <p class="text-muted small">Faça login para continuar</p>
                </div>

                {% with messages = get_flashed_messages(with_categories=true) %}
                {% if messages %}
                {% for category, message in messages %}
                <div class="alert alert-{{ category }} py-2 small">{{ message }}</div>
                {% endfor %}
                {% endif %}
                {% endwith %}

                <form action="{{ url_for('login') }}" method="post">
                    <div class="mb-3">
                        <label class="form-label fw-semibold">E-mail</label>
                        <input type="email" name="email" class="form-control" placeholder="seu@email.com" required>
                    </div>
                    <div class="mb-4">
                        <label class="form-label fw-semibold">Senha</label>
                        <input type="password" name="senha" class="form-control" placeholder="••••••••" required>
                    </div>
                    <div class="d-grid">
                        <button type="submit" class="btn btn-primary">
                            <i class="bi bi-box-arrow-in-right me-2"></i>Entrar
                        </button>
                    </div>
                </form>
                <p class="text-center text-muted small mt-3 mb-0">
                    Acesso padrão: <code>admin@igreja.com</code> / <code>admin1234</code>
                </p>
            </div>
        </div>
    </div>

</body>

</html>

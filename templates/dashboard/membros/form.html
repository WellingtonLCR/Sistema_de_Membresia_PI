{% extends "base_dashboard.html" %}
{% block title %}{{ titulo }} — Igreja Membresia{% endblock %}
{% block page_title %}{{ titulo }}{% endblock %}

{% block content %}
<div class="mb-4">
    <nav aria-label="breadcrumb">
        <ol class="breadcrumb mb-0">
            <li class="breadcrumb-item"><a href="{{ url_for('home') }}">Dashboard</a></li>
            <li class="breadcrumb-item"><a href="{{ url_for('membros_listar') }}">Membros</a></li>
            <li class="breadcrumb-item active">{{ titulo }}</li>
        </ol>
    </nav>
</div>

<form
    action="{{ url_for('membros_alterar', id=item.id_membro) if modo == 'alterar' else url_for('membros_cadastrar') }}"
    method="POST">
    <div class="row g-4">
        <div class="col-12">
            <div class="card border-0 shadow-sm">
                <div class="card-header bg-primary text-white fw-semibold"><i class="bi bi-person-fill me-2"></i>Dados
                    Pessoais</div>
                <div class="card-body p-4">
                    <div class="row g-3">
                        <div class="col-12">
                            <label class="form-label fw-semibold">Nome Completo <span
                                    class="text-danger">*</span></label>
                            <input type="text" name="nome" class="form-control" value="{{ item.nome if item else '' }}"
                                required>
                        </div>
                        <div class="col-md-4">
                            <label class="form-label fw-semibold">CPF</label>
                            <input type="text" name="cpf" class="form-control" value="{{ item.cpf if item else '' }}"
                                placeholder="000.000.000-00">
                        </div>
                        <div class="col-md-4">
                            <label class="form-label fw-semibold">Data de Nascimento</label>
                            <input type="date" name="data_nascimento" class="form-control"
                                value="{{ item.data_nascimento if item else '' }}">
                        </div>
                        <div class="col-md-4">
                            <label class="form-label fw-semibold">Celular <span class="text-danger">*</span></label>
                            <input type="text" name="celular" class="form-control"
                                value="{{ item.celular if item else '' }}" placeholder="(00) 00000-0000" required>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-semibold">E-mail</label>
                            <input type="email" name="email" class="form-control"
                                value="{{ item.email if item else '' }}" placeholder="email@exemplo.com">
                        </div>
                        <div class="col-md-3">
                            <label class="form-label fw-semibold">Data de Batismo</label>
                            <input type="date" name="data_batismo" class="form-control"
                                value="{{ item.data_batismo if item else '' }}">
                        </div>
                        <div class="col-md-3">
                            <label class="form-label fw-semibold">Data de Ingresso</label>
                            <input type="date" name="data_ingresso" class="form-control"
                                value="{{ item.data_ingresso if item else '' }}">
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="col-12">
            <div class="card border-0 shadow-sm">
                <div class="card-header bg-secondary text-white fw-semibold"><i
                        class="bi bi-geo-alt-fill me-2"></i>Endereço</div>
                <div class="card-body p-4">
                    <div class="row g-3">
                        <div class="col-md-3">
                            <label class="form-label fw-semibold">CEP</label>
                            <input type="text" name="cep" class="form-control" value="{{ item.cep if item else '' }}"
                                placeholder="00000-000">
                        </div>
                        <div class="col-md-9">
                            <label class="form-label fw-semibold">Logradouro</label>
                            <input type="text" name="logradouro" class="form-control"
                                value="{{ item.logradouro if item else '' }}">
                        </div>
                        <div class="col-md-2">
                            <label class="form-label fw-semibold">Número</label>
                            <input type="text" name="numero" class="form-control"
                                value="{{ item.numero if item else '' }}">
                        </div>
                        <div class="col-md-4">
                            <label class="form-label fw-semibold">Complemento</label>
                            <input type="text" name="complemento" class="form-control"
                                value="{{ item.complemento if item else '' }}">
                        </div>
                        <div class="col-md-3">
                            <label class="form-label fw-semibold">Bairro</label>
                            <input type="text" name="bairro" class="form-control"
                                value="{{ item.bairro if item else '' }}">
                        </div>
                        <div class="col-md-5">
                            <label class="form-label fw-semibold">Cidade</label>
                            <input type="text" name="cidade" class="form-control"
                                value="{{ item.cidade if item else '' }}">
                        </div>
                        <div class="col-md-2">
                            <label class="form-label fw-semibold">Estado</label>
                            <select name="estado" class="form-select">
                                <option value="">UF</option>
                                {% for uf in
                                ['AC','AL','AP','AM','BA','CE','DF','ES','GO','MA','MT','MS','MG','PA','PB','PR','PE','PI','RJ','RN','RS','RO','RR','SC','SP','SE','TO']
                                %}
                                <option value="{{ uf }}" {{ 'selected' if item and item.estado==uf else '' }}>{{ uf }}
                                </option>
                                {% endfor %}
                            </select>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="col-12">
            <div class="card border-0 shadow-sm">
                <div class="card-header bg-dark text-white fw-semibold"><i class="bi bi-church me-2"></i>Dados da Igreja
                    e Acesso</div>
                <div class="card-body p-4">
                    <div class="row g-3">
                        <div class="col-md-4">
                            <label class="form-label fw-semibold">Cargo / Função</label>
                            <select name="cargo_id" class="form-select">
                                <option value="">Selecione...</option>
                                {% for c in cargos %}
                                <option value="{{ c.id_cargo }}" {{ 'selected' if item and item.cargo_id==c.id_cargo
                                    else '' }}>{{ c.nome }}</option>
                                {% endfor %}
                            </select>
                        </div>
                        <div class="col-md-4">
                            <label class="form-label fw-semibold">Célula</label>
                            <select name="celula_id" class="form-select">
                                <option value="">Selecione...</option>
                                {% for ce in celulas %}
                                <option value="{{ ce.id_celula }}" {{ 'selected' if item and
                                    item.celula_id==ce.id_celula else '' }}>{{ ce.nome }}</option>
                                {% endfor %}
                            </select>
                        </div>
                        <div class="col-md-4">
                            <label class="form-label fw-semibold">Status</label>
                            <select name="status" class="form-select">
                                {% for s in ['Ativo','Inativo','Visitante','Transferido'] %}
                                <option value="{{ s }}" {{ 'selected' if item and item.status==s else ('selected' if not
                                    item and s=='Ativo' else '' ) }}>{{ s }}</option>
                                {% endfor %}
                            </select>
                        </div>
                        <div class="col-12">
                            <label class="form-label fw-semibold">Observações</label>
                            <textarea name="observacoes" class="form-control"
                                rows="2">{{ item.observacoes if item else '' }}</textarea>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-semibold">Senha {{ '' if item else '*' }}</label>
                            <input type="password" name="senha" class="form-control" placeholder="Mínimo 6 caracteres"
                                {{ 'required' if not item else '' }}>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-semibold">Confirmar Senha {{ '' if item else '*' }}</label>
                            <input type="password" name="confirmar_senha" class="form-control"
                                placeholder="Repita a senha" {{ 'required' if not item else '' }}>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="col-12 d-flex justify-content-between">
            <a href="{{ url_for('membros_listar') }}" class="btn btn-outline-secondary"><i
                    class="bi bi-arrow-left me-2"></i>Cancelar</a>
            <button type="submit" class="btn btn-primary px-4"><i class="bi bi-check-lg me-2"></i>Salvar</button>
        </div>
    </div>
</form>
{% endblock %}
